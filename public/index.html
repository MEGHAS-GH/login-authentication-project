<!DOCTYPE html>
<html>
<head>
  <title>Animated Auth</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>

<div class="container" id="container">

  <!-- LEFT PANEL -->
  <div class="form-container login-container">
    <form id="loginForm">
      <h2>Login</h2>

      <div class="input-box">
        <input type="text" id="loginUsername" placeholder="Username" required>
      </div>

      <div class="input-box">
        <input type="password" id="loginPassword" placeholder="Password" required>
        <span class="wifi" onclick="togglePassword('loginPassword', this)">📶</span>
      </div>

      <button type="submit">Login</button>
      <p id="loginMessage" class="message"></p>
      <span class="switch" id="showRegister">Don't have account? Sign Up</span>
    </form>
  </div>

  <!-- RIGHT PANEL -->
  <div class="overlay-container">
    <div class="overlay">
      <div class="overlay-panel overlay-right">
        <h1>WELCOME BACK!</h1>
        <p>We are happy to have you with us again.</p>
      </div>
      <div class="overlay-panel overlay-left">
        <h1>Hello, Friend!</h1>
        <p>Enter your details and start journey with us.</p>
      </div>
    </div>
  </div>

  <!-- REGISTER PANEL -->
  <div class="form-container register-container">
    <form id="registerForm">
      <h2>Register</h2>

      <div class="input-box">
        <input type="text" id="registerUsername" placeholder="Username" required>
      </div>

      <div class="input-box">
        <input type="password" id="registerPassword" placeholder="Password" required>
        <span class="wifi" onclick="togglePassword('registerPassword', this)">📶</span>
      </div>

      <button type="submit">Register</button>
      <p id="registerMessage" class="message"></p>
      <span class="switch" id="showLogin">Already have account? Login</span>
    </form>
  </div>

</div>

</body>
</html>
